<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Auto Deploy Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>Smart Auto Deploy Platform</h1>
            <p>AWS-first deployment dashboard for student projects</p>
        </div>

        <div class="card">
            <h2>Project Overview</h2>
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Project</th>
                        <th>Status</th>
                        <th>URL</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in projects %}
                    <tr>
                        <td>{{ item.student }}</td>
                        <td>{{ item.project }}</td>
                        <td>{{ item.status }}</td>
                        <td>{{ item.url }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
